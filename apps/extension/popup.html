<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: #09090b;
      color: #fafafa;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #71717a;
    }
    .badge.active { background: #22c55e; }
    .badge.error { background: #ef4444; }
    
    .view-unconnected, .view-connected {
      display: none;
    }
    
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #fafafa;
      box-sizing: border-box;
      font-family: monospace;
    }
    
    button {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: #fafafa;
      color: #09090b;
    }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    
    .status-text {
      font-size: 13px;
      color: #a1a1aa;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    
    #error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <h2><span id="status-badge" class="badge"></span> AutoEOD ChatGPT Sync</h2>
  
  <div id="view-unconnected" class="view-unconnected">
    <p class="status-text">Not connected. Paste your extension token from the AutoEOD Integrations page.</p>
    <div id="error-msg"></div>
    <input type="text" id="token-input" placeholder="Token string...">
    <button id="btn-connect" class="btn-primary">Connect</button>
  </div>
  
  <div id="view-connected" class="view-connected">
    <p class="status-text" id="connected-status">Connected and capturing activity.</p>
    <button id="btn-disconnect" class="btn-danger">Disconnect</button>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
